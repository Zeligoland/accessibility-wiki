<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A11Y Wiki - Guía de Accesibilidad Web</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom styles for focus and accessibility */
        .skip-link:focus {
            top: 0;
        }
        /* Ensure focus ring is visible and high contrast */
        :focus-visible {
            outline: 3px solid #4f46e5;
            outline-offset: 2px;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen flex flex-col">
    <!-- Skip Link for Keyboard Users -->
    <a href="#main-content" class="skip-link absolute -top-16 left-0 bg-indigo-600 text-white px-4 py-2 z-50 transition-all focus:top-0">
        Saltar al contenido principal
    </a>

    <!-- Header & Navigation -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-2">
                    <div class="w-10 h-9 bg-indigo-600 rounded flex items-center justify-center text-white font-bold" aria-hidden="true">TA11Y</div>
                    <span class="text-xl font-bold tracking-tight">Tambo<span class="text-indigo-600">AccessibilityWiki</span></span>
                </div>
                <nav class="hidden md:flex space-x-8 items-center" aria-label="Navegación principal">
                    <!-- Nav items will be rendered here dynamically -->
                </nav>
                <div class="flex items-center gap-4">
                    <button id="lang-toggle" class="text-xs font-bold px-2 py-1 border border-slate-200 rounded hover:bg-slate-50 transition-colors" aria-label="Cambiar idioma / Change language">
                        EN
                    </button>
                    <button id="mobile-menu-button" class="md:hidden p-2 rounded-md text-slate-600 hover:bg-slate-100 focus:outline-none focus:ring-2 focus:ring-indigo-500" aria-expanded="false" aria-controls="mobile-menu">
                        <span class="sr-only">Abrir menú</span>
                        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>
        <!-- Mobile menu -->
        <div id="mobile-menu" class="hidden md:hidden bg-white border-b border-slate-200 px-4 pt-2 pb-4 space-y-1">
            <!-- Mobile nav items will be rendered here dynamically -->
        </div>
    </header>

    <!-- Main Content Area -->
    <main id="main-content" class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12 focus:outline-none" tabindex="-1">
        <!-- Content will be rendered here dynamically based on WIKI_DATA -->
    </main>

    <!-- Footer -->
    <footer class="bg-slate-900 text-slate-300 py-12 mt-auto">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 items-center">
                <div>
                    <p class="text-sm" id="footer-text">&copy; 2026 Wiki de Accesibilidad. Un recurso para equipos de Producto, Diseño y QA.</p>
                </div>
                <div class="flex md:justify-end space-x-6">
                    <span class="text-xs uppercase tracking-widest font-bold text-slate-500" id="footer-commitment">Compromiso A11Y</span>
                </div>
            </div>
        </div>
    </footer>
    <script src="./script.js"></script>
</body>
</html>
